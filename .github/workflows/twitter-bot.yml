name: Twitter Bot

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18,20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: post, engage, or both'
        default: 'both'
        required: false

env:
  TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
  TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  twitter-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore auth cache
        id: auth-cache
        uses: actions/cache@v4
        with:
          path: auth.json
          key: twitter-auth-v1

      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Run bot
        run: node src/index.js ${{ inputs.mode || 'both' }}
